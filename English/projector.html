<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Bee - Projector View</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at center, #110c26 0%, #05030a 100%);
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'Space Grotesk', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: #ffffff;
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-col: column;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      overflow: hidden;
      position: relative;
    }

    /* Starry background effect */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
      background-size: 550px 550px, 350px 350px, 250px 250px;
      background-position: 0 0, 40px 60px, 130px 270px;
      opacity: 0.25;
      z-index: 0;
      pointer-events: none;
    }

    header {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 100;
      animation: slideDown 0.6s ease-out;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .progress {
      font-size: 1.2rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.5rem 1.2rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      overflow: hidden;
    }

    /* Inner wrapper that receives the scale transform */
    #main-scale-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    .target-word {
      font-size: 6.5rem;
      font-weight: 900;
      text-transform: none;
      background: linear-gradient(135deg, #a5f3fc 0%, #60a5fa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      filter: drop-shadow(0 0 35px rgba(96, 165, 250, 0.4));
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .phonetic-word {
      font-size: 2.8rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: rgba(250, 204, 21, 0.85);
      margin-top: -0.5rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
      filter: drop-shadow(0 0 14px rgba(250, 204, 21, 0.3));
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .slots-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.4rem;
      margin-bottom: 2.5rem;
      perspective: 1000px;
    }

    .slot {
      width: 7rem;
      height: 9rem;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      font-weight: 900;
      text-transform: uppercase;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      position: relative;
    }

    .slot-empty {
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 5px solid rgba(250, 204, 21, 0.35);
      color: rgba(255, 255, 255, 0.06);
    }

    .slot-correct {
      background: rgba(16, 185, 129, 0.12);
      border: 1.5px solid #10b981;
      color: #34d399;
      text-shadow: 0 0 20px rgba(52, 211, 153, 0.6);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.25);
      transform: scale(1.05);
    }

    .slot-incorrect {
      background: rgba(244, 63, 94, 0.12);
      border: 1.5px solid #f43f5e;
      color: #fda4af;
      text-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
      box-shadow: 0 0 40px rgba(244, 63, 94, 0.25);
      animation: shake 0.5s ease-in-out;
    }

    .limit-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      align-self: center;
      width: 4px;
      height: 9rem;
      background: rgba(244, 63, 94, 0.6);
      box-shadow: 0 0 10px rgba(244, 63, 94, 0.8);
      border-radius: 2px;
      margin: 0 0.5rem;
      position: relative;
    }

    .limit-divider::after {
      content: 'LIMIT';
      position: absolute;
      top: -25px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fda4af;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px rgba(244, 63, 94, 0.8);
    }

    .status-alert {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      padding: 1.2rem 3.5rem;
      border-radius: 24px;
      border-width: 1px;
      border-style: solid;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      text-transform: uppercase;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .status-correct {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
      color: #34d399;
      box-shadow: 0 0 50px rgba(16, 185, 129, 0.25);
    }

    .status-incorrect {
      background: rgba(244, 63, 94, 0.1);
      border-color: rgba(244, 63, 94, 0.3);
      color: #f43f5e;
      box-shadow: 0 0 50px rgba(244, 63, 94, 0.25);
      animation: pulseAlert 1.5s infinite alternate;
    }

    .waiting-message {
      font-size: 2rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.05em;
      text-align: center;
      animation: pulseText 2s infinite alternate;
    }

    footer {
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .mic-status {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(244, 63, 94, 0.08);
      border: 1px solid rgba(244, 63, 94, 0.2);
      padding: 0.8rem 2rem;
      border-radius: 20px;
      color: #fda4af;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      animation: pulseMic 1.8s infinite alternate;
    }

    .mic-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f43f5e;
      box-shadow: 0 0 12px #f43f5e;
    }

    /* Keyframes */
    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
      20%, 40%, 60%, 80% { transform: translateX(6px); }
    }

    @keyframes pulseText {
      from { opacity: 0.3; }
      to { opacity: 0.55; }
    }

    @keyframes pulseAlert {
      from { box-shadow: 0 0 30px rgba(244, 63, 94, 0.15); }
      to { box-shadow: 0 0 55px rgba(244, 63, 94, 0.35); }
    }

    @keyframes pulseMic {
      from { opacity: 0.8; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1.02); }
    }

    /* ── Size Control Panel ─────────────────────────────── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      position: relative;
    }

    .gear-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.55);
      width: 2.8rem;
      height: 2.8rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.3rem;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .gear-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      transform: rotate(30deg);
    }
    .gear-btn.active {
      background: rgba(96, 165, 250, 0.15);
      border-color: rgba(96, 165, 250, 0.4);
      color: #60a5fa;
    }

    .size-panel {
      display: none;
      position: fixed;
      background: rgba(15, 10, 35, 0.97);
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 18px;
      padding: 1.4rem 1.8rem;
      min-width: 280px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      z-index: 9999;
      animation: popIn 0.2s ease;
    }
    .size-panel.open {
      display: block;
    }
    .size-panel-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .size-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .size-icon {
      font-size: 1rem;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .size-icon.big {
      font-size: 1.6rem;
      color: rgba(255,255,255,0.55);
    }
    input[type=range]#size-slider {
      -webkit-appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 99px;
      background: linear-gradient(to right, #60a5fa var(--pct, 50%), rgba(255,255,255,0.1) var(--pct, 50%));
      outline: none;
      cursor: pointer;
    }
    input[type=range]#size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 10px rgba(96,165,250,0.6);
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]#size-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .size-value {
      font-size: 1rem;
      font-weight: 800;
      color: #60a5fa;
      min-width: 3.2rem;
      text-align: right;
    }
    .size-reset {
      margin-top: 1rem;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      border-radius: 10px;
      padding: 0.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-reset:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1 id="header-title">Contest View</h1>
    <div class="header-right">
      <div class="progress" id="progress-indicator">Words used: 0 / 0</div>
      <button class="gear-btn" id="gear-btn" title="Adjust display size">⚙️</button>
    </div>
  </header>

  <main id="main-scalable">
    <div id="main-scale-inner">
    <div id="game-content" style="display: none; width: 100%; text-align: center;">
      <div class="subtitle">Word to Spell</div>
      <div class="target-word" id="target-word-display"></div>
      <div class="phonetic-word" id="phonetic-word-display" style="display: none;"></div>
      <!-- Definition & Example display under the target word -->
      <div id="info-container" style="margin-top: -1rem; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem; align-items: center; justify-content: center; width: 100%;">
        <div id="definition-display" style="display: none; font-size: 1.8rem; font-weight: 500; color: rgba(255, 255, 255, 0.85); background: rgba(255, 255, 255, 0.04); padding: 0.8rem 2rem; border-radius: 16px; border: 1.5px solid rgba(255, 255, 255, 0.08); max-width: 85%; line-height: 1.4; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px);">
          <strong style="color: #60a5fa; font-weight: 800; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 0.05em; margin-right: 0.5rem;">Definition:</strong> <span id="definition-text"></span>
        </div>
        <div id="example-display" style="display: none; font-size: 1.8rem; font-weight: 500; color: rgba(255, 255, 255, 0.85); background: rgba(255, 255, 255, 0.04); padding: 0.8rem 2rem; border-radius: 16px; border: 1.5px solid rgba(255, 255, 255, 0.08); max-width: 85%; line-height: 1.4; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px);">
          <strong style="color: #fbbf24; font-weight: 800; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 0.05em; margin-right: 0.5rem;">Example:</strong> <span id="example-text"></span>
        </div>
      </div>
      <div class="slots-container" id="slots-wrapper"></div>
      <div style="display: flex; justify-content: center;" id="alert-wrapper"></div>
    </div>
    <div id="waiting-screen" class="waiting-message">
      Waiting for word selection...
    </div>
    </div><!-- /#main-scale-inner -->
  </main>

  <footer>
    <div class="mic-status" id="mic-indicator" style="display: none;">
      <div class="mic-dot"></div>
      <span>MICROPHONE ACTIVE - LISTENING...</span>
    </div>
  </footer>

  <script>
    const headerTitle = document.getElementById('header-title');
    const progressIndicator = document.getElementById('progress-indicator');
    const gameContent = document.getElementById('game-content');
    const waitingScreen = document.getElementById('waiting-screen');
    const slotsWrapper = document.getElementById('slots-wrapper');
    const alertWrapper = document.getElementById('alert-wrapper');
    const micIndicator = document.getElementById('mic-indicator');
    const targetWordDisplay = document.getElementById('target-word-display');

    // ── Size slider logic ─────────────────────────────────
    // The panel lives in <body> so it escapes the header's stacking context
    const sizePanel = document.createElement('div');
    sizePanel.id = 'size-panel';
    sizePanel.className = 'size-panel';
    sizePanel.innerHTML = `
      <div class="size-panel-label">Display Size</div>
      <div class="size-row">
        <span class="size-icon">A</span>
        <input type="range" id="size-slider" min="50" max="180" step="5" value="100">
        <span class="size-icon big">A</span>
        <span class="size-value" id="size-value-label">100%</span>
      </div>
      <button class="size-reset" id="size-reset">↺ Reset to default</button>
    `;
    document.body.appendChild(sizePanel);

    const gearBtn    = document.getElementById('gear-btn');
    const sizeSlider = document.getElementById('size-slider');
    const sizeLabel  = document.getElementById('size-value-label');
    const sizeReset  = document.getElementById('size-reset');
    const mainEl     = document.getElementById('main-scale-inner');

    const STORAGE_KEY = 'projector_scale';
    const DEFAULT_SCALE = 100;

    function applyScale(pct) {
      const scale = pct / 100;
      mainEl.style.transform = `scale(${scale})`;
      sizeLabel.textContent = pct + '%';
      const min = Number(sizeSlider.min);
      const max = Number(sizeSlider.max);
      const ratio = ((pct - min) / (max - min)) * 100;
      sizeSlider.style.background =
        `linear-gradient(to right, #60a5fa ${ratio}%, rgba(255,255,255,0.1) ${ratio}%)`;
      localStorage.setItem(STORAGE_KEY, pct);
    }

    function positionPanel() {
      const rect = gearBtn.getBoundingClientRect();
      sizePanel.style.top  = (rect.bottom + 10) + 'px';
      sizePanel.style.right = (window.innerWidth - rect.right) + 'px';
    }

    // Restore saved scale on load
    const savedScale = parseInt(localStorage.getItem(STORAGE_KEY)) || DEFAULT_SCALE;
    sizeSlider.value = savedScale;
    applyScale(savedScale);

    sizeSlider.addEventListener('input', () => applyScale(Number(sizeSlider.value)));

    sizeReset.addEventListener('click', (e) => {
      e.stopPropagation();
      sizeSlider.value = DEFAULT_SCALE;
      applyScale(DEFAULT_SCALE);
    });

    gearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = sizePanel.classList.contains('open');
      if (isOpen) {
        sizePanel.classList.remove('open');
        gearBtn.classList.remove('active');
      } else {
        positionPanel();
        sizePanel.classList.add('open');
        gearBtn.classList.add('active');
      }
    });

    // Close panel when clicking outside
    document.addEventListener('click', (e) => {
      if (!sizePanel.contains(e.target) && e.target !== gearBtn) {
        sizePanel.classList.remove('open');
        gearBtn.classList.remove('active');
      }
    });
    // ─────────────────────────────────────────────────────

    // Create broadcast channel
    const bc = new BroadcastChannel('spelling_bee_sync');

    function updateUI(state) {
      if (!state || !state.currentWord) {
        gameContent.style.display = 'none';
        waitingScreen.style.display = 'block';
        micIndicator.style.display = 'none';
        progressIndicator.textContent = 'Words used: 0 / 0';
        return;
      }

      waitingScreen.style.display = 'none';
      gameContent.style.display = 'block';

      // Update Target Word (Keep original casing to support proper nouns)
      targetWordDisplay.textContent = state.currentWord.word;

      // Update Phonetic Word
      const phoneticWordDisplay = document.getElementById('phonetic-word-display');
      if (state.currentWord.phonetic) {
        if (state.currentWord.phonetic.includes(' - ')) {
          const parts = state.currentWord.phonetic.split(' - ');
          const ukPhonetic = parts[0].trim();
          const usPhonetic = parts[1].trim();
          
          phoneticWordDisplay.innerHTML = `
            <div style="display: inline-flex; align-items: center; justify-content: center; gap: 3.5rem; margin-top: 0.5rem;">
              <div style="display: flex; flex-direction: column; align-items: center; gap: 0.6rem;">
                <div style="font-size: 2.2rem; font-weight: 600; font-family: var(--font-mono, monospace); color: rgba(250, 204, 21, 0.95); letter-spacing: 0.05em;">${ukPhonetic}</div>
                <img src="https://flagcdn.com/w160/gb.png" alt="UK Flag" title="UK Pronunciation" style="width: 2.8rem; height: 2.8rem; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 6px 20px rgba(0,0,0,0.4); cursor: default; user-select: none; display: block;" />
              </div>
              <div style="color: rgba(255,255,255,0.25); font-size: 2.5rem; font-weight: 300; align-self: flex-start; margin-top: -0.3rem;">—</div>
              <div style="display: flex; flex-direction: column; align-items: center; gap: 0.6rem;">
                <div style="font-size: 2.2rem; font-weight: 600; font-family: var(--font-mono, monospace); color: rgba(250, 204, 21, 0.95); letter-spacing: 0.05em;">${usPhonetic}</div>
                <img src="https://flagcdn.com/w160/us.png" alt="US Flag" title="US Pronunciation" style="width: 2.8rem; height: 2.8rem; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 6px 20px rgba(0,0,0,0.4); cursor: default; user-select: none; display: block;" />
              </div>
            </div>
          `;
        } else {
          phoneticWordDisplay.innerHTML = `
            <div style="display: inline-flex; flex-direction: column; align-items: center; gap: 0.6rem; margin-top: 0.5rem;">
              <div style="font-size: 2.2rem; font-weight: 600; font-family: var(--font-mono, monospace); color: rgba(250, 204, 21, 0.85); letter-spacing: 0.05em;">${state.currentWord.phonetic}</div>
              <div style="display: flex; align-items: center; justify-content: center; position: relative; width: 4.8rem; height: 2.8rem;">
                <img src="https://flagcdn.com/w160/gb.png" alt="UK Flag" title="Same Pronunciation (UK & US)" style="width: 2.8rem; height: 2.8rem; border-radius: 50%; object-fit: cover; border: 2.5px solid #1a202c; box-shadow: 0 6px 20px rgba(0,0,0,0.45); cursor: default; user-select: none; display: block; position: absolute; left: 0; z-index: 2;" />
                <img src="https://flagcdn.com/w160/us.png" alt="US Flag" title="Same Pronunciation (UK & US)" style="width: 2.8rem; height: 2.8rem; border-radius: 50%; object-fit: cover; border: 2.5px solid #1a202c; box-shadow: 0 6px 20px rgba(0,0,0,0.45); cursor: default; user-select: none; display: block; position: absolute; right: 0; z-index: 1;" />
              </div>
            </div>
          `;
        }
        phoneticWordDisplay.style.display = 'block';
      } else {
        phoneticWordDisplay.style.display = 'none';
      }

      // Update Definition display
      const definitionDisplay = document.getElementById('definition-display');
      const definitionText = document.getElementById('definition-text');
      if (state.showDefinition && state.currentDefinition) {
        definitionText.innerHTML = state.currentDefinition.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #60a5fa; font-weight: 800;">$1</strong>');
        definitionDisplay.style.display = 'block';
      } else {
        definitionDisplay.style.display = 'none';
      }

      // Update Example display
      const exampleDisplay = document.getElementById('example-display');
      const exampleText = document.getElementById('example-text');
      if (state.showExample && state.currentExample) {
        exampleText.innerHTML = state.currentExample.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #fbbf24; font-weight: 800;">$1</strong>');
        exampleDisplay.style.display = 'block';
      } else {
        exampleDisplay.style.display = 'none';
      }

      // Update Header
      headerTitle.textContent = `${state.levelName} - Contest`;
      progressIndicator.textContent = `Words used: ${state.usedWordsCount} / ${state.totalWordsCount}`;

      // Update Mic status
      micIndicator.style.display = state.isListening ? 'flex' : 'none';

      // Render slots
      slotsWrapper.innerHTML = '';
      const target = state.currentWord.word;
      const spoken = (state.spokenText || '').trim();
      const maxLength = Math.max(target.length, spoken.length);

      for (let i = 0; i < maxLength; i++) {
        const targetLetter = target[i] || '';
        const spokenLetter = spoken[i] || '';

        if (i === target.length) {
          const divider = document.createElement('div');
          divider.className = 'limit-divider';
          slotsWrapper.appendChild(divider);
        }

        const slot = document.createElement('div');
        slot.className = 'slot';

        if (spokenLetter) {
          slot.textContent = spokenLetter;
          if (spokenLetter.toLowerCase() === targetLetter.toLowerCase()) {
            slot.classList.add('slot-correct');
          } else {
            slot.classList.add('slot-incorrect');
          }
        } else {
          slot.textContent = '_';
          slot.classList.add('slot-empty');
        }

        slotsWrapper.appendChild(slot);
      }

      // Render Correct / Incorrect overlay
      alertWrapper.innerHTML = '';
      if (state.isCorrect !== null) {
        const alertBox = document.createElement('div');
        if (state.isCorrect) {
          alertBox.className = 'status-alert status-correct';
          alertBox.textContent = '✅ Correct !';
        } else {
          alertBox.className = 'status-alert status-incorrect';
          alertBox.textContent = '❌ Try Again !';
        }
        alertWrapper.appendChild(alertBox);
      }
    }

    // Handle messages
    bc.onmessage = (event) => {
      if (event.data && (event.data.type === 'STATE_UPDATE' || !event.data.type)) {
        updateUI(event.data);
      }
    };

    // Request initial state on load
    bc.postMessage({ type: 'REQUEST_STATE' });
  </script>
</body>
</html>
